name: ai-discussion
on:
  schedule:
    # KST 06시/12시/18시 = UTC 21시/03시/09시 — 사용자 지정 하루 3회
    - cron: "0 21,3,9 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  discuss:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install requests google-genai
      - name: AI 오케스트라 토론 (최대 150콜)
        run: python discuss.py
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DATA_GO_KR_KEY: ${{ secrets.DATA_GO_KR_KEY }}
      - name: 페이지 재생성 (토론 결과 반영)
        run: python publish.py
        env:
          DATA_GO_KR_KEY: ${{ secrets.DATA_GO_KR_KEY }}
      - name: 커밋 & 푸시
        run: |
          git config user.name "alpha-bot"
          git config user.email "bot@users.noreply.github.com"
          git add docs discussions discussions.json exports
          git commit -m "토론: $(date -u '+%Y-%m-%d %H:%M') UTC" || echo "변경 없음"
          git push
