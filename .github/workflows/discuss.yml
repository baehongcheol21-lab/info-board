name: ai-discussion
on:
  schedule:
    # GitHub cron은 보통 10~90분 지각 → 타겟을 30분 앞당겨 06/12/18시대에 걸리게 함.
    # KST 05:30/11:30/17:30 = UTC 20:30/02:30/08:30
    - cron: "30 20,2,8 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  discuss:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install requests google-genai pyyaml
      - name: AI 오케스트라 토론 (최대 150콜)
        # 계정(키) 추가 시: 여기 env에 GEMINI_API_KEY_3: ${{ secrets.GEMINI_API_KEY_3 }} 한 줄만 더 추가
        # (gemini_keys.py가 번호를 자동 인식하므로 discuss.py 코드는 건드릴 필요 없음)
        run: python discuss.py
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY_2: ${{ secrets.GEMINI_API_KEY_2 }}
          DATA_GO_KR_KEY: ${{ secrets.DATA_GO_KR_KEY }}
      - name: 페이지 재생성 (토론 결과 반영)
        run: python publish.py
        env:
          DATA_GO_KR_KEY: ${{ secrets.DATA_GO_KR_KEY }}
      - name: 커밋 & 푸시
        run: |
          git config user.name "alpha-bot"
          git config user.email "bot@users.noreply.github.com"
          git add docs discussions discussions.json exports key_usage.json trends.json logs retry_queue.json stream experience
          git commit -m "토론: $(date -u '+%Y-%m-%d %H:%M') UTC" || echo "변경 없음"
          git push
