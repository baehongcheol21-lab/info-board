name: ai-discussion
on:
  schedule:
    # GitHub cron은 보통 10~90분 지각 → 타겟을 30분 앞당겨 06/12/18시대에 걸리게 함.
    # KST 05:30/11:30/17:30 = UTC 20:30/02:30/08:30
    - cron: "30 20,2,8 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  discuss:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install requests google-genai
      - name: AI 오케스트라 토론 (최대 150콜)
        run: python discuss.py
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DATA_GO_KR_KEY: ${{ secrets.DATA_GO_KR_KEY }}
      - name: 페이지 재생성 (토론 결과 반영)
        run: python publish.py
        env:
          DATA_GO_KR_KEY: ${{ secrets.DATA_GO_KR_KEY }}
      - name: 커밋 & 푸시
        run: |
          git config user.name "alpha-bot"
          git config user.email "bot@users.noreply.github.com"
          git add docs discussions discussions.json exports
          git commit -m "토론: $(date -u '+%Y-%m-%d %H:%M') UTC" || echo "변경 없음"
          git push
