name: publish-brief
on:
  schedule:
    - cron: "5 * * * *"   # 매시간 5분에 자동 갱신
  workflow_dispatch: {}    # 수동 실행 버튼

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install requests
      - name: 페이지 생성
        run: python publish.py
        env:
          DATA_GO_KR_KEY: ${{ secrets.DATA_GO_KR_KEY }}
      - name: 커밋 & 푸시
        run: |
          git config user.name "brief-bot"
          git config user.email "bot@users.noreply.github.com"
          git add docs
          git commit -m "auto: $(date -u '+%Y-%m-%d %H:%M') UTC" || echo "변경 없음"
          git push
